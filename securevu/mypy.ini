[mypy]
python_version = 3.11
show_error_codes = true
follow_imports = normal
ignore_missing_imports = true
strict_equality = true
warn_incomplete_stub = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true
enable_error_code = ignore-without-code
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_subclassing_any = true
# https://github.com/python/mypy/issues/10757
disallow_untyped_calls = false
disallow_untyped_decorators = true
disallow_untyped_defs = true
no_implicit_optional = true
warn_return_any = true
warn_unreachable = true
no_implicit_reexport = true

[mypy-securevu.*]
ignore_errors = true

[mypy-securevu.__main__]
ignore_errors = false
disallow_untyped_calls = false

[mypy-securevu.app]
ignore_errors = false
disallow_untyped_calls = false

[mypy-securevu.const]
ignore_errors = false

[mypy-securevu.comms.*]
ignore_errors = false

[mypy-securevu.events]
ignore_errors = false

[mypy-securevu.log]
ignore_errors = false

[mypy-securevu.models]
ignore_errors = false

[mypy-securevu.plus]
ignore_errors = false

[mypy-securevu.stats]
ignore_errors = false

[mypy-securevu.track.*]
ignore_errors = false

[mypy-securevu.types]
ignore_errors = false

[mypy-securevu.version]
ignore_errors = false

[mypy-securevu.watchdog]
ignore_errors = false
disallow_untyped_calls = false


[mypy-securevu.service_manager.*]
ignore_errors = false
